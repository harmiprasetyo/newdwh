version : "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: dwh_app
    restart: unless-stopped
    working_dir: /var/www/html

    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=db_datawarehouse
      - DB_USERNAME=klinik
      - DB_PASSWORD=$$1Mk3$$z0z6
    networks:
      - laravel
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    container_name: dwh_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: dwh_db
    restart: unless-stopped

    environment:
      MARIADB_DATABASE: db_datawarehouse
      MARIADB_USER: klinik
      MARIADB_PASSWORD: $$1Mk3$$z0z6
      MARIADB_ROOT_PASSWORD: $$1Mk3$$

    command:
      --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel
networks:
  laravel:
    driver: bridge
volumes:
  db_data:
    driver: local




