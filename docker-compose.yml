#version : "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: dwh_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=db_datawarehouse
      - DB_USERNAME=klinik
      - DB_PASSWORD=511Mk3552026
    # networks:
    #   - dwh_network
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    container_name: dwh_nginx
    restart: always
    ports:
      - "7676:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mariadb:10.6
    container_name: dwh_db
    restart: unless-stopped
    ports:
      - "3396:3306"
    environment:
      MARIADB_DATABASE: db_datawarehouse
      MARIADB_ROOT_PASSWORD: 511Mk355
      MARIADB_PASSWORD: 511Mk3552026
      MARIADB_USER: klinik
      #SERVICE_TAGS: dev
      SERVICE_NAME: dwh_db
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    driver: local
